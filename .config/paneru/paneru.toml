# ~/.config/paneru/paneru.toml — aligned with ~/.config/niri/config.kdl

[options]
focus_follows_mouse = true
mouse_follows_focus = true
auto_center = false
preset_column_widths = [0.33333, 0.5, 0.66667]

[windows.all]
title = ".*"
horizontal_padding = 8
vertical_padding = 8

[decorations.active.border]
enabled = true
color = "#ff8c00"
width = 6.0
radius = 4.0

[bindings]
window_focus_west  = "alt - h"
window_focus_east  = "alt - l"
window_focus_south = "alt - j"
window_focus_north = "alt - k"
window_focus_first = "alt - home"
window_focus_last  = "alt - end"

window_swap_west  = "alt + ctrl - h"
window_swap_east  = "alt + ctrl - l"
window_swap_south = "alt + ctrl - j"
window_swap_north = "alt + ctrl - k"
window_swap_first = "alt + ctrl - home"
window_swap_last  = "alt + ctrl - end"

window_resize    = "alt - r"
window_grow      = "alt - equal"
window_shrink    = "alt - minus"
window_fullwidth = "alt - f"
window_center    = "alt - c"
window_equalize  = "alt + shift - r"

window_stack   = "alt - comma"
window_unstack = "alt - period"

mouse_nextdisplay      = "alt + shift - l"
window_nextdisplay     = "alt + shift + ctrl - l"
window_nextdisplaysend = "alt + shift + ctrl - h"

window_manage = "alt + shift - space"
